name: Generate Theme Screenshots

on:
  push:
    branches: [main, master]
    paths:
      - 'src/styles/**'
      - 'src/contexts/ThemeContext.tsx'
      - 'src/pages/LoginPage.tsx'
      - 'src/components/**'
      - 'vite.config.ts'
  workflow_dispatch:

jobs:
  build-and-screenshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Build frontend
        run: npm run build

      - name: Start dev server
        run: npm run dev &
        timeout-minutes: 2

      - name: Wait for server to be ready
        run: |
          npx wait-on http://localhost:5173 --timeout 30000

      - name: Create theme screenshots
        run: node scripts/capture-themes.js
        continue-on-error: true

      - name: Upload screenshots as artifacts
        uses: actions/upload-artifact@v3
        if: success()
        with:
          name: theme-screenshots
          path: design-previews/screenshots/
          retention-days: 30

      - name: Upload screenshots to design-previews
        if: success()
        run: |
          echo "Theme screenshots generated and available in artifacts"

      - name: Comment on PR with screenshots link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Theme screenshots generated! Download from the workflow artifacts or view in the `design-previews/` folder.'
            })
